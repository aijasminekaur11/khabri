# =============================================================================
# GitHub Actions Scheduled News Digest
# Khabri - News Intelligence System
#
# This runs AUTOMATICALLY on GitHub's servers - NO PC NEEDED!
# =============================================================================

name: 📰 Scheduled News Digest

permissions:
  contents: read
  actions: read

# NOTE: Schedules disabled - using separate morning-digest.yml and evening-digest.yml
# This file is kept for manual triggering only (workflow_dispatch)
on:
  # schedule:
  #   # Morning Digest - 7:00 AM IST (UTC+5:30) = 1:30 AM UTC
  #   - cron: '30 1 * * *'
  #   # Evening Digest - 4:00 PM IST (UTC+5:30) = 10:30 AM UTC
  #   - cron: '30 10 * * *'

  # Allow manual trigger for testing and backward compatibility
  workflow_dispatch:
    inputs:
      digest_type:
        description: 'Which digest to run'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - evening
          - test

env:
  PYTHON_VERSION: '3.11'
  # Explicitly set timezone for all operations
  TZ: 'Asia/Kolkata'

jobs:
  # ==========================================================================
  # SEND NEWS DIGEST
  # ==========================================================================
  send-digest:
    name: 📨 Send News Digest
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 📂 Restore sent articles cache
        uses: actions/cache@v4
        with:
          path: .khabri_cache
          key: khabri-digest-sent-${{ github.ref }}
          restore-keys: |
            khabri-digest-sent-

      - name: 🕐 Determine digest type
        id: digest-type
        run: |
          # Log current time for debugging
          echo "Current UTC time: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "Current IST time: $(TZ=Asia/Kolkata date '+%Y-%m-%d %H:%M:%S')"
          
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.digest_type }}" >> $GITHUB_OUTPUT
            echo "Manual trigger: ${{ github.event.inputs.digest_type }} digest"
          else
            # Determine digest type based on UTC hour with strict windows
            # Morning: 1:30 AM UTC (7:00 AM IST) - Accept runs between 1:00-3:59 AM UTC
            # Evening: 10:30 AM UTC (4:00 PM IST) - Accept runs between 10:00-12:59 PM UTC
            # Runs outside these windows will fail (likely excessive delays)
            HOUR=$(date -u +%H)
            MINUTE=$(date -u +%M)
            
            echo "UTC Hour: $HOUR, Minute: $MINUTE"
            
            # Morning digest: UTC hour 1-3 (IST 6:30 AM - 8:30 AM)
            # Narrow window to catch delays up to ~2 hours but not more
            if [ "$HOUR" -ge "1" ] && [ "$HOUR" -lt "4" ]; then
              echo "type=morning" >> $GITHUB_OUTPUT
              echo "Detected: Morning digest (UTC hour: $HOUR)"
              
              # Alert if morning digest is significantly delayed
              if [ "$HOUR" -ge "3" ]; then
                echo "⚠️ WARNING: Morning digest is running late (UTC hour: $HOUR, expected: 1)" >> $GITHUB_STEP_SUMMARY
              fi
            # Evening digest: UTC hour 10-12 (IST 3:30 PM - 5:30 PM)
            elif [ "$HOUR" -ge "10" ] && [ "$HOUR" -lt "13" ]; then
              echo "type=evening" >> $GITHUB_OUTPUT
              echo "Detected: Evening digest (UTC hour: $HOUR)"
              
              # Alert if evening digest is significantly delayed
              if [ "$HOUR" -ge "12" ]; then
                echo "⚠️ WARNING: Evening digest is running late (UTC hour: $HOUR, expected: 10)" >> $GITHUB_STEP_SUMMARY
              fi
            else
              # Outside scheduled windows - likely a delayed/retry run
              echo "type=unknown" >> $GITHUB_OUTPUT
              echo "⚠️ WARNING: Run triggered outside normal schedule (UTC hour: $HOUR)" >> $GITHUB_STEP_SUMMARY
              echo "This may be a delayed or retry run. Check GitHub Actions status."
              exit 1
            fi
          fi

      - name: 📰 Run News Scraper
        id: scrape
        run: |
          echo "Starting news scraper at $(TZ=Asia/Kolkata date '+%Y-%m-%d %H:%M:%S IST')"
          python scripts/github_digest_runner.py scrape
          echo "Scraping completed at $(TZ=Asia/Kolkata date '+%Y-%m-%d %H:%M:%S IST')"
        env:
          DIGEST_TYPE: ${{ steps.digest-type.outputs.type }}

      - name: 🔄 Process Articles
        id: process
        run: |
          echo "Starting article processing at $(TZ=Asia/Kolkata date '+%Y-%m-%d %H:%M:%S IST')"
          python scripts/github_digest_runner.py process
          echo "Processing completed at $(TZ=Asia/Kolkata date '+%Y-%m-%d %H:%M:%S IST')"
        env:
          DIGEST_TYPE: ${{ steps.digest-type.outputs.type }}

      - name: 📱 Send Telegram Notification
        if: success()
        run: |
          echo "Sending Telegram notification at $(TZ=Asia/Kolkata date '+%Y-%m-%d %H:%M:%S IST')"
          python scripts/github_digest_runner.py notify telegram
          echo "Telegram notification sent at $(TZ=Asia/Kolkata date '+%Y-%m-%d %H:%M:%S IST')"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DIGEST_TYPE: ${{ steps.digest-type.outputs.type }}

      - name: 📧 Send Email Notification
        if: success()
        run: |
          echo "Sending email notification at $(TZ=Asia/Kolkata date '+%Y-%m-%d %H:%M:%S IST')"
          python scripts/github_digest_runner.py notify email
          echo "Email notification sent at $(TZ=Asia/Kolkata date '+%Y-%m-%d %H:%M:%S IST')"
        env:
          SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
          SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_TO }}
          DIGEST_TYPE: ${{ steps.digest-type.outputs.type }}

      - name: 💾 Save sent articles cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: .khabri_cache
          key: khabri-digest-sent-${{ github.ref }}

      - name: 📊 Log Results
        if: always()
        run: |
          echo "## 📰 Digest Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Digest Type | ${{ steps.digest-type.outputs.type }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Scheduled Time (IST) | $(TZ=Asia/Kolkata date '+%Y-%m-%d %H:%M IST') |" >> $GITHUB_STEP_SUMMARY
          echo "| Actual Run Time (UTC) | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| Actual Run Time (IST) | $(TZ=Asia/Kolkata date '+%Y-%m-%d %H:%M IST') |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Timezone Verification" >> $GITHUB_STEP_SUMMARY
          echo "- Morning digest scheduled: 7:00 AM IST (1:30 AM UTC)" >> $GITHUB_STEP_SUMMARY
          echo "- Morning digest window: 1:00-3:59 AM UTC (6:30-9:29 AM IST)" >> $GITHUB_STEP_SUMMARY
          echo "- Evening digest scheduled: 4:00 PM IST (10:30 AM UTC)" >> $GITHUB_STEP_SUMMARY
          echo "- Evening digest window: 10:00 AM-12:59 PM UTC (3:30-6:29 PM IST)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Delay Warnings" >> $GITHUB_STEP_SUMMARY
          echo "- If runs are consistently delayed, consider:" >> $GITHUB_STEP_SUMMARY
          echo "  1. Using a self-hosted runner for precise timing" >> $GITHUB_STEP_SUMMARY
          echo "  2. Scheduling at a less busy time (e.g., 1:00 AM UTC)" >> $GITHUB_STEP_SUMMARY
          echo "  3. Contacting GitHub Support if delays exceed 1 hour" >> $GITHUB_STEP_SUMMARY

      - name: ❌ Notify on Failure
        if: failure()
        run: |
          echo "Digest failed! Check logs above."
          echo "Failure occurred at: $(TZ=Asia/Kolkata date '+%Y-%m-%d %H:%M:%S IST')"
        continue-on-error: true
