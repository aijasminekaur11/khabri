# =============================================================================
# GitHub Actions Scheduled News Digest
# Khabri - News Intelligence System
#
# This runs AUTOMATICALLY on GitHub's servers - NO PC NEEDED!
# =============================================================================

name: 📰 Scheduled News Digest

on:
  schedule:
    # Morning Digest - 7:00 AM IST = 1:30 AM UTC
    - cron: '30 1 * * *'

    # Evening Digest - 4:00 PM IST = 10:30 AM UTC
    - cron: '30 10 * * *'

  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      digest_type:
        description: 'Which digest to run'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - evening
          - test

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ==========================================================================
  # SEND NEWS DIGEST
  # ==========================================================================
  send-digest:
    name: 📨 Send News Digest
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 📂 Restore sent articles cache
        uses: actions/cache@v4
        with:
          path: .khabri_cache
          key: khabri-digest-sent-${{ github.ref }}
          restore-keys: |
            khabri-digest-sent-

      - name: 🕐 Determine digest type
        id: digest-type
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.digest_type }}" >> $GITHUB_OUTPUT
          else
            # Check current UTC hour to determine digest type
            # Morning: 1:30 AM UTC (7 AM IST) - runs between 0-5 UTC
            # Evening: 10:30 AM UTC (4 PM IST) - runs between 6-15 UTC
            HOUR=$(date -u +%H)
            if [ "$HOUR" -lt "6" ]; then
              echo "type=morning" >> $GITHUB_OUTPUT
              echo "Detected: Morning digest (UTC hour: $HOUR)"
            else
              echo "type=evening" >> $GITHUB_OUTPUT
              echo "Detected: Evening digest (UTC hour: $HOUR)"
            fi
          fi

      - name: 📰 Run News Scraper
        id: scrape
        run: |
          python scripts/github_digest_runner.py scrape
        env:
          DIGEST_TYPE: ${{ steps.digest-type.outputs.type }}

      - name: 🔄 Process Articles
        id: process
        run: |
          python scripts/github_digest_runner.py process
        env:
          DIGEST_TYPE: ${{ steps.digest-type.outputs.type }}

      - name: 📱 Send Telegram Notification
        if: success()
        run: |
          python scripts/github_digest_runner.py notify telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DIGEST_TYPE: ${{ steps.digest-type.outputs.type }}

      - name: 📧 Send Email Notification
        if: success()
        run: |
          python scripts/github_digest_runner.py notify email
        env:
          SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
          SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_TO }}
          DIGEST_TYPE: ${{ steps.digest-type.outputs.type }}

      - name: 💾 Save sent articles cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: .khabri_cache
          key: khabri-digest-sent-${{ github.ref }}

      - name: 📊 Log Results
        if: always()
        run: |
          echo "## 📰 Digest Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Digest Type | ${{ steps.digest-type.outputs.type }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run Time | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY

      - name: ❌ Notify on Failure
        if: failure()
        run: |
          echo "Digest failed! Check logs above."
        continue-on-error: true
