# GitHub Actions Workflow for Auto-Fix via Telegram
# Triggers when issues with 'auto-fix' label are created
# Runs Claude Code-like automation to fix issues and create PRs

name: 🤖 Auto-Fix via Telegram

on:
  issues:
    types: [opened, labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to fix'
        required: true
        type: number

env:
  PYTHON_VERSION: '3.9'

jobs:
  # ================================================================
  # JOB 1: Validate Issue
  # ================================================================
  validate-issue:
    name: ✅ Validate Issue
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && startsWith(github.event.issue.title, '[Auto-Fix]'))
    outputs:
      should_proceed: ${{ steps.check.outputs.proceed }}
      issue_number: ${{ steps.check.outputs.issue_number }}
      issue_title: ${{ steps.check.outputs.issue_title }}
      issue_body: ${{ steps.check.outputs.issue_body }}

    steps:
      - name: 📋 Check issue details
        id: check
        run: |
          echo "proceed=true" >> $GITHUB_OUTPUT

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "issue_number=${{ inputs.issue_number }}" >> $GITHUB_OUTPUT
          else
            echo "issue_number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
            echo "issue_title=${{ github.event.issue.title }}" >> $GITHUB_OUTPUT
          fi

      - name: 💬 Add comment to issue
        uses: actions/github-script@v6
        with:
          script: |
            const issueNumber = ${{ steps.check.outputs.issue_number }};

            github.rest.issues.createComment({
              issue_number: issueNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🤖 **Auto-Fix Started**\n\nI\'m analyzing this issue and will create a fix automatically.\n\n**Steps:**\n1. ✅ Issue validated\n2. ⏳ Analyzing codebase...\n3. ⏳ Creating fix...\n4. ⏳ Running tests...\n5. ⏳ Creating pull request...\n\nYou\'ll be notified when the fix is ready for review.'
            });

  # ================================================================
  # JOB 2: Analyze and Fix
  # ================================================================
  auto-fix:
    name: 🔧 Auto-Fix Issue
    runs-on: ubuntu-latest
    needs: validate-issue
    if: needs.validate-issue.outputs.should_proceed == 'true'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install requests PyGithub anthropic

      - name: 🤖 Generate fix with Claude AI
        id: analyze
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          echo "🤖 Running Claude AI auto-fix..."

          python scripts/auto_fix_with_claude.py ${{ needs.validate-issue.outputs.issue_number }}

          if [ $? -eq 0 ]; then
            echo "analysis_complete=true" >> $GITHUB_OUTPUT
            echo "fix_applied=true" >> $GITHUB_OUTPUT
          else
            echo "analysis_complete=true" >> $GITHUB_OUTPUT
            echo "fix_applied=false" >> $GITHUB_OUTPUT
          fi

          echo "fix_branch=auto-fix-issue-${{ needs.validate-issue.outputs.issue_number }}" >> $GITHUB_OUTPUT

      - name: 🔧 Create fix branch
        if: steps.analyze.outputs.fix_applied == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          BRANCH_NAME="auto-fix-issue-${{ needs.validate-issue.outputs.issue_number }}"
          git checkout -b "$BRANCH_NAME"

      - name: 📝 Stage all changes made by Claude
        id: apply_fix
        if: steps.analyze.outputs.fix_applied == 'true'
        run: |
          # Claude script already modified the files
          # Just stage them for commit
          git add -A

          echo "fix_applied=true" >> $GITHUB_OUTPUT

      - name: 🧪 Run tests
        id: tests
        continue-on-error: true
        run: |
          # Run smoke tests to ensure nothing is broken
          pytest testing/test_cases/smoke/ -v --tb=short --maxfail=3 --no-cov || echo "tests_failed=true" >> $GITHUB_OUTPUT
          echo "tests_run=true" >> $GITHUB_OUTPUT

      - name: 💾 Commit changes
        if: steps.apply_fix.outputs.fix_applied == 'true'
        run: |
          git commit -m "Auto-fix: Resolve issue #${{ needs.validate-issue.outputs.issue_number }}

          Automated fix applied via Telegram bot request.

          Issue: ${{ needs.validate-issue.outputs.issue_title }}

          Changes:
          - Automated analysis and fixes applied
          - Tests run to verify functionality

          Closes #${{ needs.validate-issue.outputs.issue_number }}

          Co-Authored-By: GitHub Actions Bot <actions@github.com>"

      - name: 📤 Push branch
        if: steps.apply_fix.outputs.fix_applied == 'true'
        run: |
          BRANCH_NAME="auto-fix-issue-${{ needs.validate-issue.outputs.issue_number }}"
          git push origin "$BRANCH_NAME"

      - name: 📬 Create Pull Request
        if: steps.apply_fix.outputs.fix_applied == 'true'
        uses: actions/github-script@v6
        id: create_pr
        with:
          script: |
            const branchName = `auto-fix-issue-${{ needs.validate-issue.outputs.issue_number }}`;
            const issueNumber = ${{ needs.validate-issue.outputs.issue_number }};

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🤖 Auto-fix: Issue #${issueNumber}`,
              head: branchName,
              base: 'main',
              body: `## 🤖 Automated Fix

            This PR was created automatically in response to issue #${issueNumber} via Telegram bot.

            ### Changes Made
            - Automated analysis performed
            - Fixes applied based on issue description
            - Tests run to verify functionality

            ### Test Results
            - Smoke Tests: ${{ steps.tests.outputs.tests_failed == 'true' && '❌ Failed' || '✅ Passed' }}

            ### Review Required
            Please review the changes carefully before merging.

            Closes #${issueNumber}

            ---
            *Generated automatically via GitHub Actions*
            `
            });

            return pr.number;

  # ================================================================
  # JOB 3: Notify via Telegram
  # ================================================================
  notify-telegram:
    name: 📱 Notify via Telegram
    runs-on: ubuntu-latest
    needs: [validate-issue, auto-fix]
    if: always()

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install dependencies
        run: |
          pip install requests

      - name: 📱 Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<EOF
          import requests
          import os

          bot_token = os.getenv('TELEGRAM_BOT_TOKEN')
          chat_id = os.getenv('TELEGRAM_CHAT_ID')

          if not bot_token or not chat_id:
              print("Telegram credentials not configured")
              exit(0)

          issue_number = "${{ needs.validate-issue.outputs.issue_number }}"
          job_status = "${{ needs.auto-fix.result }}"

          if job_status == "success":
              message = f"""✅ **Auto-Fix Complete!**

          📋 Issue #{issue_number} has been fixed automatically.

          🔗 Check the Pull Request on GitHub to review and merge.

          Repository: ${{ github.repository }}
          """
          else:
              message = f"""⚠️ **Auto-Fix Failed**

          📋 Issue #{issue_number} could not be fixed automatically.

          The issue requires manual review. Please check the GitHub issue for details.

          Repository: ${{ github.repository }}
          """

          api_url = f"https://api.telegram.org/bot{bot_token}/sendMessage"

          payload = {
              'chat_id': chat_id,
              'text': message,
              'parse_mode': 'Markdown'
          }

          response = requests.post(api_url, json=payload)

          if response.status_code == 200:
              print("Telegram notification sent successfully")
          else:
              print(f"Failed to send notification: {response.status_code}")
          EOF

      - name: 💬 Update issue with results
        uses: actions/github-script@v6
        with:
          script: |
            const issueNumber = ${{ needs.validate-issue.outputs.issue_number }};
            const jobStatus = "${{ needs.auto-fix.result }}";

            let comment = "";

            if (jobStatus === "success") {
              comment = `✅ **Auto-Fix Completed**

            A pull request has been created with the automated fix.

            **Next Steps:**
            1. Review the PR changes
            2. Verify the fix resolves the issue
            3. Merge the PR if everything looks good

            You'll receive a Telegram notification with the PR link.`;
            } else {
              comment = `❌ **Auto-Fix Failed**

            The automated fix could not be applied. This issue requires manual review.

            **Possible reasons:**
            - Issue description needs more details
            - Complex changes required
            - Manual intervention needed

            A developer will review this issue shortly.`;
            }

            github.rest.issues.createComment({
              issue_number: issueNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
