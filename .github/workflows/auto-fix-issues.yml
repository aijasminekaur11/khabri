name: "Auto-Fix via Telegram"

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  issues: write

env:
  PYTHON_VERSION: '3.9'

jobs:
  auto-fix:
    name: "Auto-Fix and Deploy"
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && startsWith(github.event.issue.title, '[Auto-Fix]')

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install requests anthropic

      - name: Run auto-fix
        id: fix
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          ISSUE_NUM="${{ github.event.issue.number }}"
          echo "Running auto-fix for issue #${ISSUE_NUM}..."
          
          python scripts/auto_fix_with_claude.py "$ISSUE_NUM" && echo "success=true" >> "$GITHUB_OUTPUT" || echo "success=false" >> "$GITHUB_OUTPUT"
          echo "issue_number=${ISSUE_NUM}" >> "$GITHUB_OUTPUT"

      - name: Commit to main
        if: steps.fix.outputs.success == 'true'
        run: |
          git config user.name "Khabri Bot"
          git config user.email "bot@khabri.app"
          git add -A
          git diff --cached --quiet || (git commit -m "Auto-fix #${{ steps.fix.outputs.issue_number }}" && git push origin main)

      - name: Notify Telegram
        if: always()
        run: |
          python -c "
          import requests, os
          token = '${{ secrets.TELEGRAM_BOT_TOKEN }}'
          for chat_id in '${{ secrets.TELEGRAM_CHAT_ID }}'.split(','):
              msg = '✅ Fix deployed!' if '${{ steps.fix.outputs.success }}' == 'true' else '⚠️ Fix failed'
              requests.post(f'https://api.telegram.org/bot{token}/sendMessage', json={'chat_id': chat_id.strip(), 'text': f'{msg} - Issue #${{ steps.fix.outputs.issue_number }}'})
          "

      - name: Close issue
        if: steps.fix.outputs.success == 'true'
        run: |
          curl -X PATCH \
            -H "Authorization: token ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.fix.outputs.issue_number }} \
            -d '{"state":"closed"}'
