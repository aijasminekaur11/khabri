# =============================================================================
# Weekly Health Check - Source Monitoring
# Khabri - News Intelligence System
#
# Checks if all news sources are still accessible
# Runs every Monday at 7:30 AM IST
# =============================================================================

name: 🩺 Weekly Health Check

permissions:
  contents: read
  actions: read

on:
  schedule:
    # Every Monday at 7:30 AM IST = 2:00 AM UTC
    - cron: '0 2 * * 1'

  # Manual trigger for testing
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  health-check:
    name: 🩺 Check Source Health
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp pyyaml

      - name: 🩺 Run Health Check
        run: |
          python scripts/health_check_runner.py check

      - name: 📱 Send Health Report
        run: |
          python scripts/health_check_runner.py notify
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: 📊 Log Results
        if: always()
        run: |
          echo "## 🩺 Weekly Health Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Run Time | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
