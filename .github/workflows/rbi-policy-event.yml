# =============================================================================
# RBI Policy Review 2026 - Event-Based News Alerts
# Khabri - News Intelligence System
#
# High-frequency alerts during RBI Policy announcement
# Date: February 7, 2026
# Time: 10:00 AM - 1:00 PM IST
# =============================================================================

name: 🏦 RBI Policy Live Alerts

on:
  schedule:
    # During RBI Policy (Feb 7, 2026): Every 15 minutes from 10 AM to 1 PM IST
    # 10:00 AM IST = 4:30 AM UTC
    # 1:00 PM IST = 7:30 AM UTC

    # Every 15 minutes during RBI hours (4:30 AM - 7:30 AM UTC)
    - cron: '30,45 4 7 2 *'    # 10:00, 10:15 AM IST
    - cron: '0,15,30,45 5 7 2 *'  # 10:30 - 11:15 AM IST
    - cron: '0,15,30,45 6 7 2 *'  # 11:30 AM - 12:15 PM IST
    - cron: '0,15,30 7 7 2 *'     # 12:30 PM - 1:00 PM IST

  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Run in test mode'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  PYTHON_VERSION: '3.11'

jobs:
  rbi-alert:
    name: 🏦 RBI Policy Alert
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser aiohttp

      - name: 🏦 Scrape RBI News
        run: |
          python scripts/rbi_alert_runner.py scrape

      - name: 🔄 Process & Filter
        run: |
          python scripts/rbi_alert_runner.py process

      - name: 📱 Send Telegram Alert
        run: |
          python scripts/rbi_alert_runner.py notify telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: 📧 Send Email Alert
        if: success()
        run: |
          python scripts/rbi_alert_runner.py notify email
        env:
          EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

      - name: 📊 Log Results
        if: always()
        run: |
          echo "## 🏦 RBI Policy Alert Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Event | RBI Policy Review Feb 2026 |" >> $GITHUB_STEP_SUMMARY
          echo "| Run Time | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
