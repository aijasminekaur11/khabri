# GitHub Actions Workflow for Automated Testing
# Magic Bricks News Intelligence System
# Auto-generated by Claude CLI

name: 🧪 Automated Testing Suite

# DISABLED automatic triggers - only manual run
# To re-enable, uncomment the push/pull_request/schedule sections
on:
  # push:
  #   branches: [ main, develop, feature/* ]
  # pull_request:
  #   branches: [ main, develop ]
  # schedule:
  #   - cron: '30 18 * * *'
  workflow_dispatch:  # Manual trigger only
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - unit
          - integration
          - e2e
          - smoke

env:
  PYTHON_VERSION: '3.9'
  TEST_MODE: 'true'

jobs:
  # ================================================================
  # JOB 1: SMOKE TESTS (Quick validation - 30 seconds)
  # ================================================================
  smoke-tests:
    name: 🚀 Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r testing/requirements-test.txt

      - name: 🧪 Run smoke tests
        run: |
          pytest testing/test_cases/smoke/ -v --tb=short --maxfail=3
        timeout-minutes: 1

      - name: 📊 Report status
        if: always()
        run: |
          echo "Smoke tests completed"

  # ================================================================
  # JOB 2: UNIT TESTS (Fast isolated tests - 5 minutes)
  # ================================================================
  unit-tests:
    name: 🔬 Unit Tests
    runs-on: ubuntu-latest
    needs: smoke-tests
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r testing/requirements-test.txt

      - name: 🧪 Run unit tests with coverage
        run: |
          pytest testing/test_cases/unit/ \
            -v \
            --cov=src \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            --cov-fail-under=90 \
            --maxfail=10 \
            --tb=short

      - name: 📈 Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-unit-tests

      - name: 📁 Upload coverage HTML report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: coverage-report-unit
          path: testing/coverage_html/

      - name: 📊 Generate coverage badge
        if: github.ref == 'refs/heads/main'
        run: |
          coverage-badge -o coverage.svg -f

  # ================================================================
  # JOB 3: INTEGRATION TESTS (Component interactions - 10 minutes)
  # ================================================================
  integration-tests:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r testing/requirements-test.txt

      - name: 🧪 Run integration tests
        run: |
          pytest testing/test_cases/integration/ \
            -v \
            --tb=short \
            --maxfail=5
        env:
          TEST_MODE: true

      - name: 📁 Upload test logs
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: integration-test-logs
          path: testing/debug_logs/

  # ================================================================
  # JOB 4: E2E TESTS (Full workflows - 30 minutes, daily only)
  # ================================================================
  e2e-tests:
    name: 🌐 End-to-End Tests
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 45

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r testing/requirements-test.txt

      - name: 🧪 Run E2E tests
        run: |
          pytest testing/test_cases/e2e/ \
            -v \
            --tb=short \
            --maxfail=3
        env:
          TEST_MODE: true
          TELEGRAM_BOT_TOKEN_TEST: ${{ secrets.TELEGRAM_BOT_TOKEN_TEST }}
          TELEGRAM_CHAT_ID_TEST: ${{ secrets.TELEGRAM_CHAT_ID_TEST }}
          GMAIL_ADDRESS_TEST: ${{ secrets.GMAIL_ADDRESS_TEST }}
          GMAIL_APP_PASSWORD_TEST: ${{ secrets.GMAIL_APP_PASSWORD_TEST }}

      - name: 📁 Upload E2E test artifacts
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: e2e-test-artifacts
          path: |
            testing/debug_logs/
            testing/issues/

  # ================================================================
  # JOB 5: SECURITY SCAN (Vulnerability checks)
  # ================================================================
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit safety bandit

      - name: 🔍 Run pip-audit
        run: |
          pip-audit --desc

      - name: 🔍 Run safety check
        run: |
          safety check --json || true

      - name: 🔍 Run bandit security linter
        run: |
          bandit -r src/ -f json -o bandit-report.json || true

      - name: 📁 Upload security reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json

  # ================================================================
  # JOB 6: GENERATE ISSUE FILES (On failure)
  # ================================================================
  generate-issues:
    name: 📝 Generate Issue Files
    runs-on: ubuntu-latest
    if: failure()
    needs: [unit-tests, integration-tests, e2e-tests]
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📝 Generate issue files
        run: |
          python testing/scripts/generate_issue.py \
            --run-id="${{ github.run_id }}" \
            --commit="${{ github.sha }}"

      - name: 📁 Upload issue files
        uses: actions/upload-artifact@v3
        with:
          name: test-failure-issues
          path: testing/issues/*.md

      - name: 💬 Comment on PR (if applicable)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ Tests failed. Issue files generated for Claude CLI to fix autonomously.'
            })

  # ================================================================
  # JOB 7: TEST REPORT (Aggregate results)
  # ================================================================
  test-report:
    name: 📊 Test Report
    runs-on: ubuntu-latest
    if: always()
    needs: [smoke-tests, unit-tests, integration-tests]
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📊 Generate test summary
        run: |
          echo "## 🧪 Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Tests | ${{ needs.smoke-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: ✅ All tests passed
        if: needs.smoke-tests.result == 'success' && needs.unit-tests.result == 'success' && needs.integration-tests.result == 'success'
        run: |
          echo "✅ All tests passed successfully!"

      - name: ❌ Some tests failed
        if: needs.smoke-tests.result == 'failure' || needs.unit-tests.result == 'failure' || needs.integration-tests.result == 'failure'
        run: |
          echo "❌ Some tests failed. Check logs and issue files."
          exit 1
