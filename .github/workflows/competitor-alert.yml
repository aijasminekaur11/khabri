# =============================================================================
# Competitor Early-Warning System
# Khabri - News Intelligence System
#
# Monitors competitor blogs/news for new articles
# Runs twice daily: Morning (8 AM IST) and Evening (6 PM IST)
# =============================================================================

name: 🏢 Competitor Watch

permissions:
  contents: read
  actions: read

on:
  schedule:
    # Morning: 8:00 AM IST = 2:30 AM UTC
    - cron: '30 2 * * *'

    # Evening: 6:00 PM IST = 12:30 PM UTC
    - cron: '30 12 * * *'

  # Manual trigger for testing
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  competitor-watch:
    name: 🏢 Check Competitor News
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser aiohttp pyyaml beautifulsoup4 requests

      - name: 📂 Restore sent articles cache
        uses: actions/cache@v4
        with:
          path: .khabri_cache
          key: khabri-competitor-sent-${{ github.run_id }}
          restore-keys: |
            khabri-competitor-sent-

      - name: 🏢 Scrape Competitor News
        run: |
          python scripts/competitor_alert_runner.py scrape

      - name: 🔄 Process & Check New
        run: |
          python scripts/competitor_alert_runner.py process

      - name: 📱 Send Alert (if new articles)
        run: |
          python scripts/competitor_alert_runner.py notify
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: 💾 Save sent articles cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: .khabri_cache
          key: khabri-competitor-sent-${{ github.run_id }}

      - name: 📊 Log Results
        if: always()
        run: |
          echo "## 🏢 Competitor Watch Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Run Time | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
