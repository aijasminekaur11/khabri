# =============================================================================
# Competitor Early-Warning System
# Khabri - News Intelligence System
#
# Monitors competitor blogs/news for new articles
# Runs every 2 hours during business hours
# =============================================================================

name: 🏢 Competitor Watch

on:
  schedule:
    # Every 2 hours from 8 AM to 8 PM IST (2:30 AM to 2:30 PM UTC)
    - cron: '30 2 * * *'   # 8:00 AM IST
    - cron: '30 4 * * *'   # 10:00 AM IST
    - cron: '30 6 * * *'   # 12:00 PM IST
    - cron: '30 8 * * *'   # 2:00 PM IST
    - cron: '30 10 * * *'  # 4:00 PM IST
    - cron: '30 12 * * *'  # 6:00 PM IST
    - cron: '30 14 * * *'  # 8:00 PM IST

  # Manual trigger for testing
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  competitor-watch:
    name: 🏢 Check Competitor News
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser aiohttp pyyaml beautifulsoup4 requests

      - name: 🏢 Scrape Competitor News
        run: |
          python scripts/competitor_alert_runner.py scrape

      - name: 🔄 Process & Check New
        run: |
          python scripts/competitor_alert_runner.py process

      - name: 📱 Send Alert (if new articles)
        run: |
          python scripts/competitor_alert_runner.py notify
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: 📊 Log Results
        if: always()
        run: |
          echo "## 🏢 Competitor Watch Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Run Time | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
