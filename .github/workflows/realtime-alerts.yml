# =============================================================================
# Real-time Breaking News Alerts
# Khabri - News Intelligence System
#
# Checks for breaking/high-priority news every 15 minutes
# Only alerts on important keywords (RBI, PMAY, breaking, etc.)
# =============================================================================

name: ⚡ Real-time Alerts

on:
  schedule:
    # Every 15 minutes during active hours (8 AM - 9 PM IST)
    # 8 AM IST = 2:30 AM UTC, 9 PM IST = 3:30 PM UTC
    - cron: '*/15 2-15 * * *'

  # Manual trigger for testing
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  realtime-alert:
    name: ⚡ Check Breaking News
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser aiohttp pyyaml

      - name: ⚡ Scrape Breaking News
        run: |
          python scripts/realtime_alert_runner.py scrape

      - name: 🔄 Process & Filter High-Priority
        run: |
          python scripts/realtime_alert_runner.py process

      - name: 📱 Send Alert (if breaking news)
        run: |
          python scripts/realtime_alert_runner.py notify
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: 📊 Log Results
        if: always()
        run: |
          echo "## ⚡ Real-time Alert Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Run Time | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
