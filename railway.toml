[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python scripts/run_telegram_bot.py"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[env]
# Railway will use environment variables from the dashboard
# DO NOT add actual secrets here - add them in Railway dashboard
