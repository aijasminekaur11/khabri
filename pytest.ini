[pytest]
# Pytest Configuration for Magic Bricks News Intelligence System
# Auto-generated by Claude CLI

# Test discovery patterns
testpaths = testing/test_cases
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test execution options
addopts =
    # Verbose output
    --verbose
    --strict-markers
    --strict-config

    # Coverage options
    --cov=src
    --cov-report=html:testing/coverage_html
    --cov-report=term-missing
    --cov-report=xml:testing/coverage.xml
    --cov-fail-under=90

    # Failure handling
    --maxfail=5
    --tb=short

    # Timeouts
    --timeout=300
    --timeout-method=thread

    # Output formatting
    --color=yes
    --durations=10

    # Warnings
    -W ignore::DeprecationWarning
    -W ignore::PendingDeprecationWarning

# Custom markers for test categorization
markers =
    unit: Unit tests (fast, isolated component tests)
    integration: Integration tests (medium speed, component interaction tests)
    e2e: End-to-end tests (slow, full workflow tests)
    smoke: Smoke tests (quick sanity checks)
    slow: Slow running tests (>5 seconds)
    real: Tests using real external services (weekly only)
    security: Security validation tests
    performance: Performance and load tests
    benchmark: Performance benchmark tests
    stability: System stability tests
    flaky: Tests that sometimes fail (auto-retry enabled)

# Log configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = testing/debug_logs/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] [%(filename)s:%(lineno)d] %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Minimum Python version
minversion = 3.9

# Test discovery
norecursedirs = .git .tox dist build *.egg __pycache__ .pytest_cache

# Cache configuration
cache_dir = testing/.pytest_cache

# Timeout configuration
timeout_func_only = true

# Coverage configuration
[coverage:run]
source = src
omit =
    */tests/*
    */testing/*
    */__pycache__/*
    */site-packages/*
    */venv/*

[coverage:report]
precision = 2
show_missing = true
skip_covered = false

exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

[coverage:html]
directory = testing/coverage_html
