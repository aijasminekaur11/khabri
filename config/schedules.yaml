# Schedules Configuration
# Khabri - News Intelligence System

# =============================================================================
# DIGEST SCHEDULES
# =============================================================================
digests:
  morning:
    enabled: true
    time: "07:00"  # 7:00 AM IST
    timezone: "Asia/Kolkata"
    include_categories:
      - market_updates
      - policy
      - infrastructure
      - launches
      - celebrity
    max_articles: 20
    channels:
      - telegram
      - email

  evening:
    enabled: true
    time: "16:00"  # 4:00 PM IST
    timezone: "Asia/Kolkata"
    include_categories:
      - market_updates
      - competitor_news
      - breaking
    max_articles: 15
    channels:
      - telegram

# =============================================================================
# REAL-TIME ALERTS
# =============================================================================
realtime_alerts:
  enabled: true
  check_interval_minutes: 15

  # Alert triggers
  triggers:
    - type: "keyword_match"
      keywords:
        - "breaking"
        - "RBI"
        - "interest rate"
        - "PMAY"
      priority: "high"
      channels:
        - telegram

    - type: "celebrity_mention"
      priority: "high"
      channels:
        - telegram

    - type: "competitor_publish"
      priority: "medium"
      channels:
        - telegram

# =============================================================================
# EVENT-BASED SCHEDULES
# =============================================================================
events:
  - name: "Union Budget 2026"
    date: "2026-02-01"
    start_time: "11:00"
    end_time: "14:00"
    enabled: true
    scrape_interval_minutes: 10
    keywords:
      - "budget"
      - "housing"
      - "real estate"
      - "tax"
      - "stamp duty"
      - "PMAY"
      - "affordable housing"
    channels:
      - telegram
      - email

  - name: "RBI Policy Review"
    date: "2026-02-07"
    start_time: "10:00"
    end_time: "13:00"
    enabled: true
    scrape_interval_minutes: 15
    keywords:
      - "RBI"
      - "repo rate"
      - "interest rate"
      - "home loan"
      - "EMI"
    channels:
      - telegram

  - name: "Quarterly Results Season"
    date: "2026-01-15"
    start_time: "09:00"
    end_time: "18:00"
    enabled: false
    scrape_interval_minutes: 30
    keywords:
      - "quarterly results"
      - "DLF"
      - "Godrej Properties"
      - "Oberoi Realty"
      - "Prestige Estates"

# =============================================================================
# MAINTENANCE WINDOWS
# =============================================================================
maintenance:
  # When to skip scraping
  skip_hours:
    - 0   # Midnight
    - 1   # 1 AM
    - 2   # 2 AM
    - 3   # 3 AM
    - 4   # 4 AM

  # Weekly maintenance (no scraping)
  weekly_maintenance:
    day: "sunday"
    start_hour: 2
    end_hour: 6
