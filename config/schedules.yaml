# Schedules Configuration
# Defines when various automated tasks should run

digests:
  morning:
    enabled: true
    time: "07:00"  # 7:00 AM IST
    timezone: "Asia/Kolkata"
    days:
      - monday
      - tuesday
      - wednesday
      - thursday
      - friday
    categories:
      - real_estate
      - infrastructure
      - policy
      - celebrity
      - competitor

  evening:
    enabled: true
    time: "16:00"  # 4:00 PM IST
    timezone: "Asia/Kolkata"
    days:
      - monday
      - tuesday
      - wednesday
      - thursday
      - friday
    categories:
      - real_estate
      - infrastructure
      - policy
      - celebrity
      - competitor

scraping:
  # How often to check for new articles
  interval_minutes: 30
  
  # Active hours for scraping (24-hour format)
  active_hours:
    start: "06:00"
    end: "23:00"
  
  # Days to scrape
  days:
    - monday
    - tuesday
    - wednesday
    - thursday
    - friday
    - saturday
    - sunday

alerts:
  # Real-time alerts for high-priority news
  enabled: true
  
  # Minimum signal score to trigger alert
  min_signal_score: 8
  
  # Throttle alerts to avoid spam
  throttle_minutes: 15
  
  # Alert channels
  channels:
    - telegram
    - email

cleanup:
  # Clean up old news items
  enabled: true
  
  # Run cleanup daily at this time
  time: "02:00"  # 2:00 AM
  
  # Keep items for this many days
  retention_days: 30

monitoring:
  # Health check interval
  health_check_minutes: 60
  
  # Report errors immediately
  error_reporting: true
  
  # Daily status report time
  status_report_time: "23:30"  # 11:30 PM
