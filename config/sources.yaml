# News Sources Configuration
# Khabri - News Intelligence System

# =============================================================================
# NEWS WEBSITES
# =============================================================================
news_sources:
  # Economic Times Real Estate
  - name: "Economic Times Realty"
    url: "https://economictimes.indiatimes.com/industry/services/property-/-cstruction"
    enabled: true
    frequency_minutes: 30
    selectors:
      article: "div.eachStory"
      title: "h3 a"
      link: "h3 a"
      date: "time"

  # LiveMint Real Estate
  - name: "LiveMint Realty"
    url: "https://www.livemint.com/industry/real-estate"
    enabled: true
    frequency_minutes: 30
    selectors:
      article: "div.listView"
      title: "h2 a"
      link: "h2 a"

  # Financial Express
  - name: "Financial Express"
    url: "https://www.financialexpress.com/money/real-estate/"
    enabled: true
    frequency_minutes: 60

  # Business Standard
  - name: "Business Standard"
    url: "https://www.business-standard.com/industry/real-estate"
    enabled: true
    frequency_minutes: 60

  # Money Control
  - name: "Money Control"
    url: "https://www.moneycontrol.com/news/business/real-estate/"
    enabled: true
    frequency_minutes: 30

# =============================================================================
# RSS FEEDS
# =============================================================================
rss_feeds:
  # Government Sources
  - name: "PIB Housing"
    url: "https://pib.gov.in/RssMain.aspx?ModId=6&Lang=1&Regid=3"
    enabled: true
    frequency_minutes: 60

  # News Aggregators
  - name: "Google News - Indian Real Estate"
    url: "https://news.google.com/rss/search?q=indian+real+estate&hl=en-IN&gl=IN&ceid=IN:en"
    enabled: true
    frequency_minutes: 30

  - name: "Google News - Mumbai Property"
    url: "https://news.google.com/rss/search?q=mumbai+property+prices&hl=en-IN&gl=IN&ceid=IN:en"
    enabled: true
    frequency_minutes: 60

  - name: "Google News - RERA"
    url: "https://news.google.com/rss/search?q=RERA+india&hl=en-IN&gl=IN&ceid=IN:en"
    enabled: true
    frequency_minutes: 120

